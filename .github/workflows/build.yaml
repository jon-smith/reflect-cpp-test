name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  format:
    runs-on: ubuntu-24.04

    name: Format Check

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install clang-format 22
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-22
          clang-format-22 --version

      - name: Check formatting
        run: git ls-files '*.cpp' '*.hpp' | xargs clang-format-22 --dry-run --Werror

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
        include:
          - os: macos-14
            compiler: clang
          - os: windows-2022
            compiler: msvc-x64
          - os: ubuntu-24.04
            compiler: gcc

    runs-on: ${{ matrix.os }}

    name: Build ${{ matrix.os }} ${{ matrix.compiler }}

    env:
      preset: ${{ matrix.compiler }}-release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure VS Toolchain (Windows)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Config
        run: cmake --preset ${{ env.preset }}

      - name: Build CMake project
        run: cmake --build out/build/${{ env.preset }}

      - name: Run tests
        run: ctest --test-dir out/build/${{ env.preset }} --output-on-failure
